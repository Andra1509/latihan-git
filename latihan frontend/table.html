<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table</title>

    <style>
        table, th, td {
            border: 1px solid black;
            border-collapse: collapse;
            padding: 8px;
        }
    </style>
</head>
<body>

    <!-- Tabel dipindahkan ke dalam body -->
    <table>
        <thead>
            <tr>
                <th>No.</th>
                <th>Nama</th>
                <th>Tempat Lahir</th>
                <TH>Tempat Tinggal</TH>
                <th>No.telp</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1.</td>
                <td>John</td>
                <td>London</td>
                <td>USA sanannya dikit</td>
                <td>08888</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
